  {id:'b1',stream:'brand',text:'IG grid posts',pri:'normal',dueDate:'',note:'',done:false,subs:[{id:'b1a',text:'Grid post 1',done:false},{id:'b1b',text:'Grid post 2',done:false}]},
  {id:'b2',stream:'brand',text:'1 reel',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
  {id:'b3',stream:'brand',text:'Plan and lock in date for first photoshoot',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
  {id:'b4',stream:'brand',text:'Run hotlist of IG influencer contacts through Co-work',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
  {id:'b5',stream:'brand',text:'Co-work: build list of potential photographers and venue hosts',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
  {id:'b6',stream:'brand',text:'Professional brand development',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
  {id:'lf1',stream:'lifestyle',text:'Buy wider-pleat trousers and jeans',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
  {id:'lf2',stream:'lifestyle',text:'Buy tank top and loafers',pri:'normal',dueDate:'',note:'',done:false,subs:[]},
];

const DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbz2LADG8mIgBBO3wUYcT7B1GTGtYbjtsUbMDzltMb8FXTvggTOEHnSKLm43SH8ERIE/exec';

let tasks=[],log=[],openSecs={},tab='plan',filter='all',editingId=null,editState={},addPri='normal',sheetUrl=DEFAULT_SHEET_URL;

function dd(d){if(!d)return'';const[,m,day]=d.split('-');return`${parseInt(day)} ${MONTHS[parseInt(m)-1]}`;}
function dn(d){if(!d)return'';return DAYS_W[new Date(d+'T00:00:00').getDay()];}
function diff(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);}
function isOv(t){return t.dueDate&&!t.done&&diff(TODAY,t.dueDate)<0;}
function dpC(t){if(!t.dueDate||t.done)return'';const d=diff(TODAY,t.dueDate);if(d<0)return'ov';if(d===0)return'sw';return'ok';}
function dpTxt(t){if(!t.dueDate)return'+ due date';const d=diff(TODAY,t.dueDate);const s=`${dn(t.dueDate)} ${dd(t.dueDate)}`;if(t.done)return s;if(d<0)return`${s} · ${Math.abs(d)}d overdue`;if(d===0)return`${s} · today`;return s;}
function bHtml(pri){const p=PC[pri];if(!p||!p.l)return'';return`<span class="bdg" style="background:${p.bg};color:${p.tc}">${p.l}</span>`;}
function isToday(t){return t.dueDate===TODAY;}
function leafCount(t){return 1+(t.subs||[]).length;}
function doneCount(t){return(t.done?1:0)+((t.subs||[]).filter(s=>s.done).length);}

function wkStart(ds){const d=new Date(ds+'T00:00:00'),day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1));return d.toISOString().slice(0,10);}

function showSaved(){const el=document.getElementById('save-ind');if(!el)return;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000);}

async function save(){
  const payload={tasks,log};
  if(sheetUrl){
    try{
      const r=await fetch(sheetUrl,{method:'POST',body:JSON.stringify(payload)});
      if(r.ok)showSaved();
    }catch(e){console.warn('Sheet write failed, falling back to localStorage',e);localStorage.setItem(SK,JSON.stringify(payload));showSaved();}
  } else {
    localStorage.setItem(SK,JSON.stringify(payload));
    showSaved();
  }
}

async function loadData(){
  if(sheetUrl){
    try{
      const r=await fetch(sheetUrl);
      if(r.ok){const d=await r.json();if(d.tasks&&d.tasks.length){tasks=d.tasks;log=d.log||[];return;}}
    }catch(e){console.warn('Sheet read failed',e);}
  }
  try{const raw=localStorage.getItem(SK);if(raw){const d=JSON.parse(raw);if(d.tasks&&d.tasks.length){tasks=d.tasks;log=d.log||[];return;}}}catch(e){}
  tasks=JSON.parse(JSON.stringify(DT));log=[];
}

function connectSheet(){
  const url=(document.getElementById('sheet-url').value||'').trim();
  if(!url){alert('Paste your Apps Script URL first');return;}
  sheetUrl=url;
  localStorage.setItem('rpm_sheet_url',url);
  document.getElementById('sheet-status').textContent='Connecting...';
  loadData().then(()=>{
    document.getElementById('sheet-status').textContent='Connected to Google Sheet';
    renderAll();
  }).catch(()=>document.getElementById('sheet-status').textContent='Connection failed — check URL');
}

const priCls={urgent:'eu',priority:'ep',normal:'en',backburner:'eb',awaiting:'ea'};
const aCls={urgent:'au',priority:'ap',normal:'an',backburner:'ab',awaiting:'aa'};

function computeStats(){
  let total=0,done=0,todayC=0,urgentC=0;
  tasks.forEach(t=>{const lc=leafCount(t);total+=lc;done+=doneCount(t);if(isToday(t)&&!t.done)todayC++;if((t.pri==='urgent'||t.pri==='priority')&&!t.done)urgentC++;});
  return{total,done,today:todayC,urgent:urgentC,pct:total>0?Math.round(done/total*100):0};
}

function renderStats(){
  const s=computeStats();
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="sl">Total items</div><div class="sv">${s.total}</div></div>
    <div class="stat"><div class="sl">Completed</div><div class="sv">${s.done}</div><div class="ss">${s.pct}% done</div></div>
    <div class="stat"><div class="sl">Due today</div><div class="sv">${s.today}</div><div class="ss">remaining</div></div>
    <div class="stat"><div class="sl">Priority / urgent</div><div class="sv">${s.urgent}</div><div class="ss">open items</div></div>`;
}

function editFormHtml(t){
  const sOpts=Object.entries(SC).map(([k,v])=>`<option value="${k}"${editState.stream===k?' selected':''}>${v.label}</option>`).join('');
  const pBtns=['urgent','priority','normal','backburner','awaiting'].map(p=>`<button class="epb${editState.pri===p?' '+priCls[p]:''}" data-pri="${p}" onclick="selEP('${p}')">${PC[p].l||'Normal'}</button>`).join('');
  return`<div class="ef">
    <label>Task</label><textarea id="ef-text" oninput="editState.text=this.value">${editState.text}</textarea>
    <div class="efr2">
      <div><label>Stream</label><select id="ef-stream" onchange="editState.stream=this.value">${sOpts}</select></div>
      <div><label>Due date</label><input type="date" id="ef-date" value="${editState.dueDate||''}" onchange="editState.dueDate=this.value"></div>
    </div>
    <label>Priority</label><div class="eprow">${pBtns}</div>
    <label>Note</label><input type="text" id="ef-note" value="${(editState.note||'').replace(/"/g,'&quot;')}" oninput="editState.note=this.value" placeholder="Context, blockers...">
    <div class="efbtns"><button class="ef-save" onclick="saveEdit()">Save</button><button class="ef-cancel" onclick="cancelEdit()">Cancel</button><button class="ef-del" onclick="deleteTask('${t.id}')">Delete</button></div>
  </div>`;}

function selEP(p){editState.pri=p;document.querySelectorAll('.epb').forEach(b=>{b.className='epb';if(b.dataset.pri===p)b.classList.add(priCls[p]);});}
function selAP(p){addPri=p;document.querySelectorAll('.apb').forEach(b=>{b.className='apb';if(b.dataset.p===p)b.classList.add(aCls[p]);});}

async function saveEdit(){const t=tasks.find(t=>t.id===editingId);if(!t)return;t.text=editState.text;t.stream=editState.stream;t.pri=editState.pri;t.dueDate=editState.dueDate;t.note=editState.note;editingId=null;await save();renderAll();}
function cancelEdit(){editingId=null;renderAll();}
async function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);editingId=null;await save();renderAll();}
function startEdit(id){const t=tasks.find(t=>t.id===id);if(!t)return;editingId=id;editState={text:t.text,stream:t.stream,pri:t.pri,dueDate:t.dueDate||'',note:t.note||''};renderAll();setTimeout(()=>{const el=document.getElementById('ef-text');if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length;}},60);}

async function togTask(id){const t=tasks.find(t=>t.id===id);if(!t)return;t.done=!t.done;if(t.done){log.push({taskId:id,completedAt:TODAY,dueDate:t.dueDate||null,daysLate:t.dueDate?diff(t.dueDate,TODAY):null,weekStart:wkStart(TODAY)});}else{log=log.filter(e=>e.taskId!==id);}await save();renderAll();}
async function togSub(tid,sid){const t=tasks.find(t=>t.id===tid);if(!t)return;const s=t.subs.find(s=>s.id===sid);if(!s)return;s.done=!s.done;await save();renderAll();}

function taskHtml(t){
  const isEdit=editingId===t.id;const ov=isOv(t);const tc=dpC(t);const today=isToday(t);
  let h=`<div class="item">`;
  if(today&&!t.done)h+=`<div class="today-dot"></div>`;
  h+=`<div class="chk${t.done?' dn':''}" onclick="togTask('${t.id}')"></div><div class="ib">`;
  h+=`<span class="it${t.done?' dn':''}">${t.text}${bHtml(t.pri)}${ov&&!t.done?`<span class="bdg" style="background:#fcebeb;color:#a32d2d">Overdue</span>`:''}<span class="dp ${tc}" onclick="startEdit('${t.id}')">${dpTxt(t)}</span></span>`;
  if(t.note&&!t.done)h+=`<div class="inote">${t.note}</div>`;
  if(isEdit)h+=editFormHtml(t);
  if(t.subs&&t.subs.length&&!isEdit){h+=`<div class="subs">`;t.subs.forEach(s=>{h+=`<div class="sub"><div class="sc${s.done?' dn':''}" onclick="togSub('${t.id}','${s.id}')"></div><span class="st${s.done?' dn':''}">${s.text}</span></div>`;});h+=`</div>`;}
  h+=`</div>`;if(!isEdit)h+=`<button class="edbtn" onclick="startEdit('${t.id}')" title="Edit">&#9998;</button>`;
  h+=`</div>`;return h;
}

function secProg(stream){const its=tasks.filter(t=>t.stream===stream);let total=0,done=0;its.forEach(t=>{total+=leafCount(t);done+=doneCount(t);});return{total,done};}

function renderPlan(){
  let h=`<div class="ftabs">`;
  [{f:'all',l:'All'},{f:'today',l:'Today'},{f:'priority',l:'Priority'},{f:'pending',l:'Pending'},{f:'done',l:'Done'}].forEach(x=>{h+=`<button class="ftab${filter===x.f?' on':''}" onclick="setFilter('${x.f}')">${x.l}</button>`;});
  h+=`</div>`;
  GC.forEach(g=>{
    const hasAny=g.streams.some(s=>tasks.find(t=>t.stream===s));if(!hasAny)return;
    h+=`<div class="grp">${g.label}</div>`;
    g.streams.forEach(s=>{
      const cfg=SC[s];const its=tasks.filter(t=>t.stream===s);if(!its.length)return;
      const isOpen=openSecs[s]!==false;const{total,done}=secProg(s);const pct=total>0?Math.round(done/total*100):0;
      let itsH='';
      its.forEach(t=>{
        if(filter==='today'&&!isToday(t)&&editingId!==t.id)return;
        if(filter==='priority'&&t.pri!=='urgent'&&t.pri!=='priority'&&editingId!==t.id)return;
        if(filter==='done'&&!t.done&&!(t.subs||[]).some(s=>s.done)&&editingId!==t.id)return;
        if(filter==='pending'&&t.done&&editingId!==t.id)return;
        itsH+=taskHtml(t);
      });
      h+=`<div class="sec"><div class="shd" onclick="toggleSec('${s}')"><div class="sdot" style="background:${cfg.color}"></div><span class="stitle">${cfg.label}</span><span class="sct">${done}/${total}</span><span class="sch${isOpen?' op':''}">&#9654;</span></div><div class="pb"><div class="pf" style="width:${pct}%;background:${cfg.color}"></div></div><div class="its${isOpen?' op':''}">${itsH}</div></div>`;
    });
  });
  document.getElementById('plan-view').innerHTML=h;
}

function renderAdd(){
  const sOpts=Object.entries(SC).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  document.getElementById('add-view').innerHTML=`<div class="add-card">
    <label>Task</label><textarea id="a-text" placeholder="What needs to happen?" rows="2"></textarea>
    <div class="ar2" style="margin-top:10px">
      <div><label>Stream</label><select id="a-stream">${sOpts}</select></div>
      <div><label>Due date</label><input type="date" id="a-date"></div>
    </div>
    <label style="margin-top:10px">Priority</label>
    <div class="aprow">${['urgent','priority','normal','backburner','awaiting'].map(p=>`<button class="apb${p==='normal'?' an':''}" data-p="${p}" onclick="selAP('${p}')">${PC[p].l||'Normal'}</button>`).join('')}</div>
    <label style="margin-top:10px">Note <span style="color:#ccc;font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></label>
    <input type="text" id="a-note" placeholder="Context, blockers...">
    <div style="display:flex;align-items:center"><button class="a-submit" onclick="addTask()">+ Add task</button><span class="aflash" id="aflash">Added</span></div>
  </div>`;}

async function addTask(){
  const text=(document.getElementById('a-text').value||'').trim();if(!text)return;
  tasks.push({id:'u'+Date.now(),stream:document.getElementById('a-stream').value,text,pri:addPri,dueDate:document.getElementById('a-date').value||'',note:(document.getElementById('a-note').value||'').trim(),done:false,subs:[]});
  await save();
  document.getElementById('a-text').value='';document.getElementById('a-date').value='';document.getElementById('a-note').value='';
  const fl=document.getElementById('aflash');fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),1500);
  renderStats();
}

function renderAnalytics(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length,pct=total>0?Math.round(done/total*100):0;
  const ov=tasks.filter(t=>isOv(t));
  const weeks=[];for(let i=7;i>=0;i--){const d=new Date(TODAY_D);d.setDate(d.getDate()-i*7);const ws=wkStart(d.toISOString().slice(0,10));const d2=new Date(ws+'T00:00:00');weeks.push({ws,lbl:`${d2.getDate()} ${MONTHS[d2.getMonth()]}`,onTime:0,late:0,noDue:0});}
  log.forEach(e=>{const w=weeks.find(w=>w.ws===e.weekStart);if(!w)return;if(!e.dueDate)w.noDue++;else if(e.daysLate!==null&&e.daysLate<=0)w.onTime++;else w.late++;});
  let h=`<div class="stats" style="margin-bottom:1rem">
    <div class="stat"><div class="sl">Completed</div><div class="sv">${log.length}</div><div class="ss">all time</div></div>
    <div class="stat"><div class="sl">This week</div><div class="sv">${done}</div><div class="ss">${pct}% of plan</div></div>
    <div class="stat"><div class="sl">Overdue</div><div class="sv">${ov.length}</div><div class="ss">open items</div></div>
    <div class="stat"><div class="sl">Remaining</div><div class="sv">${total-done}</div></div>
  </div>
  <div class="acard"><div class="atitle">Progress by stream</div>`;
  Object.entries(SC).forEach(([k,v])=>{
    const its=tasks.filter(t=>t.stream===k);if(!its.length)return;
    let tot=0,dn=0;its.forEach(t=>{tot+=leafCount(t);dn+=doneCount(t);});const pct2=tot>0?Math.round(dn/tot*100):0;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:${v.color};flex-shrink:0"></div><span style="font-size:12px;flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${v.label}</span><span style="font-size:11px;color:#999;width:40px;text-align:right">${dn}/${tot}</span><div style="width:110px;height:5px;border-radius:3px;background:#eee;overflow:hidden"><div style="height:100%;width:${pct2}%;background:${v.color};border-radius:3px"></div></div><span style="font-size:11px;color:#bbb;width:32px;text-align:right">${pct2}%</span></div>`;
  });
  h+=`</div><div class="acard"><div class="atitle">Overdue items</div>`;
  if(!ov.length){h+=`<div class="empty">No overdue items</div>`;}
  else{h+=`<table class="otbl"><tr><th>Task</th><th>Stream</th><th>Overdue by</th></tr>`;ov.forEach(t=>{const dv=Math.abs(diff(TODAY,t.dueDate));h+=`<tr><td style="max-width:220px">${t.text}</td><td>${SC[t.stream].label}</td><td style="color:#a32d2d;font-weight:600">${dv}d</td></tr>`;});h+=`</table>`;}
  h+=`</div>`;
  document.getElementById('analytics-view').innerHTML=h;
}

function renderAll(){renderStats();if(tab==='plan')renderPlan();else if(tab==='add')renderAdd();else if(tab==='analytics')renderAnalytics();}

function setFilter(f){filter=f;renderPlan();}
function toggleSec(id){openSecs[id]=openSecs[id]===false?true:false;renderAll();}
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.getElementById('plan-view').style.display=t==='plan'?'block':'none';
  document.getElementById('add-view').style.display=t==='add'?'block':'none';
  document.getElementById('analytics-view').style.display=t==='analytics'?'block':'none';
  renderAll();
}

document.getElementById('main-tabs').innerHTML=`
  <button class="tab on" data-t="plan" onclick="setTab('plan')">Plan</button>
  <button class="tab" data-t="add" onclick="setTab('add')">+ Add task</button>
  <button class="tab" data-t="analytics" onclick="setTab('analytics')">Analytics</button>`;

const savedUrl=localStorage.getItem('rpm_sheet_url');
if(savedUrl){sheetUrl=savedUrl;}
if(sheetUrl){
  if(document.getElementById('sheet-url')){document.getElementById('sheet-url').value=sheetUrl;}
  if(document.getElementById('sheet-status')){document.getElementById('sheet-status').textContent='Connected to Google Sheet';}
}

(async()=>{await loadData();renderAll();})();
</script>
